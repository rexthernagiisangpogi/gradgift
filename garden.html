<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Gift For You 🌸</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(160deg, #1a0a0f 0%, #2d1020 40%, #1a0a0f 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── PAGE ── */
    .garden-page {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 20px;
      gap: 0;
    }

    .garden-page h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-style: italic;
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      color: #f5d0e0;
      letter-spacing: 4px;
      text-shadow: 0 0 30px rgba(255,150,180,0.4);
      margin-bottom: 6px;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.3s forwards;
    }
    .garden-page .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: #c08090;
      letter-spacing: 3px;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.6s forwards;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── SCENE ── */
    .scene {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 50px;
      flex-wrap: wrap;
    }

    /* ══════════════════════════════
       BOUQUET
    ══════════════════════════════ */
    .bouquet {
      position: relative;
      width: 320px;
      height: 480px;
      animation: gentleSway 6s ease-in-out infinite;
      transform-origin: bottom center;
    }
    @keyframes gentleSway {
      0%,100% { transform: rotate(-1.5deg); }
      50%      { transform: rotate(1.5deg); }
    }

    /* ── STEMS SVG ── */
    .stems-svg {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    .stem-path {
      fill: none;
      stroke-linecap: round;
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
    }
    .stem-path.grow { animation: growStem 1.4s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes growStem {
      to { stroke-dashoffset: 0; }
    }

    /* ── RIBBON ── */
    .ribbon {
      position: absolute;
      bottom: 60px;
      left: 50%; transform: translateX(-50%);
      width: 110px; z-index: 10;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity:0; transform: translateX(-50%) scale(0.8); }
      to   { opacity:1; transform: translateX(-50%) scale(1); }
    }

    /* ── FLOWER SLOTS ── */
    .flower {
      position: absolute;
      transform-origin: bottom center;
      opacity: 0;
      transform: scale(0.3) translateY(30px);
      transition: none;
      z-index: 5;
    }
    .flower.bloom {
      animation: bloomIn 1.6s cubic-bezier(0.34,1.2,0.64,1) forwards;
    }
    @keyframes bloomIn {
      0%   { opacity:0; transform: scale(0.15) translateY(40px) rotate(-8deg); filter: blur(4px) brightness(0.4); }
      40%  { opacity:0.7; filter: blur(1px) brightness(0.8); }
      70%  { transform: scale(1.08) translateY(-6px) rotate(2deg); filter: blur(0) brightness(1.05); }
      100% { opacity:1; transform: scale(1) translateY(0) rotate(0deg); filter: blur(0) brightness(1); }
    }

    .flower img {
      width: 100%; height: 100%;
      object-fit: contain;
      border-radius: 50%;
      pointer-events: none;
      user-select: none;
    }

    /* depth blur for back flowers */
    .flower.back  { filter: blur(0.6px) brightness(0.88) saturate(0.9); z-index: 3; }
    .flower.front { filter: blur(0) brightness(1.05) saturate(1.1); z-index: 7; }
    .flower.mid   { filter: blur(0.2px) brightness(0.96); z-index: 5; }

    /* breathing after bloom */
    .flower.breathe {
      animation: bloomIn 1.6s cubic-bezier(0.34,1.2,0.64,1) forwards,
                 breathe var(--bd,5s) ease-in-out var(--bdelay,0s) infinite;
    }
    @keyframes breathe {
      0%,100% { transform: scale(1) rotate(var(--br,0deg)); }
      50%      { transform: scale(1.04) rotate(calc(var(--br,0deg) + 1deg)); }
    }

    /* ── LEAVES ── */
    .leaf {
      position: absolute;
      opacity: 0;
      transform-origin: bottom center;
      z-index: 2;
    }
    .leaf.sprout {
      animation: leafSprout 1s cubic-bezier(0.34,1.4,0.64,1) forwards;
    }
    @keyframes leafSprout {
      from { opacity:0; transform: scale(0) rotate(-40deg); }
      to   { opacity:0.92; transform: scale(1) rotate(0deg); }
    }
    .leaf img { width:100%; height:100%; object-fit:contain; pointer-events:none; }

    /* ── POLLEN PARTICLES ── */
    .pollen-dot {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 20;
      animation: pollenDrift ease-in-out infinite;
      opacity: 0;
    }
    @keyframes pollenDrift {
      0%   { opacity:0; transform:translate(0,0) scale(0.5); }
      20%  { opacity:0.9; }
      100% { opacity:0; transform:translate(var(--px,10px), -80px) scale(1.4); }
    }

    /* ── LIGHT RAYS ── */
    .light-ray {
      position: absolute;
      top: 0; left: 50%;
      width: 2px; height: 60%;
      background: linear-gradient(to bottom, rgba(255,220,180,0.12), transparent);
      transform-origin: top center;
      pointer-events: none;
      z-index: 0;
      animation: rayFlicker 4s ease-in-out infinite;
    }
    @keyframes rayFlicker {
      0%,100% { opacity:0.4; }
      50%      { opacity:0.8; }
    }

    /* ── ENVELOPE ── */
    .envelope      { width: 110px !important; height: 76px !important; }
    .env-flap      { height: 42px !important; }
    .env-heart     { font-size: 1.4rem !important; }
    .envelope-wrap {
      animation: fadeUp 1s ease 1s both;
      margin-bottom: 20px;
    }
    .envelope-wrap span {
      font-family: 'Cormorant Garamond', serif !important;
      font-style: italic !important;
      font-size: 0.95rem !important;
      letter-spacing: 2px;
      color: #f5d0e0 !important;
    }

    /* ── FALLING PETALS override for dark bg ── */
    .petal {
      background: radial-gradient(ellipse at 40% 30%, rgba(255,180,200,0.8), rgba(220,100,140,0.5)) !important;
    }
  </style>
</head>
<body>

  <div class="petals" id="petals"></div>

  <!-- light rays -->
  <div class="light-ray" style="transform:rotate(-20deg);"></div>
  <div class="light-ray" style="transform:rotate(10deg); opacity:0.3;"></div>
  <div class="light-ray" style="transform:rotate(35deg); opacity:0.2;"></div>

  <div class="garden-page">
    <h2>A little something for you</h2>
    <p class="subtitle">click the envelope when you're ready</p>

    <div class="scene">

      <!-- ══ BOUQUET ══ -->
      <div class="bouquet" id="bouquet">

        <!-- STEMS -->
        <svg class="stems-svg" viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg">
          <!-- center back stem -->
          <path id="s0" class="stem-path" d="M160,460 C158,400 155,340 158,240" stroke="#2d5a27" stroke-width="5"/>
          <!-- left stem -->
          <path id="s1" class="stem-path" d="M160,455 C145,400 120,350 90,255" stroke="#3a7a32" stroke-width="4.5"/>
          <!-- right stem -->
          <path id="s2" class="stem-path" d="M160,455 C175,400 200,350 230,255" stroke="#3a7a32" stroke-width="4.5"/>
          <!-- far left stem -->
          <path id="s3" class="stem-path" d="M158,450 C135,400 100,360 55,270" stroke="#4a8a40" stroke-width="4"/>
          <!-- far right stem -->
          <path id="s4" class="stem-path" d="M162,450 C185,400 220,360 265,268" stroke="#4a8a40" stroke-width="4"/>
          <!-- front center stem -->
          <path id="s5" class="stem-path" d="M160,460 C161,410 162,360 162,210" stroke="#2d5a27" stroke-width="4.5"/>
        </svg>

        <!-- LEAVES -->
        <div class="leaf" id="l0" style="width:52px;height:38px;bottom:195px;left:68px;">
          <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=100&auto=format&fit=crop&q=60" 
               onerror="this.parentElement.style.display='none'"
               style="border-radius:0;filter:hue-rotate(60deg) saturate(1.4) brightness(0.7);" alt="leaf"/>
        </div>
        <div class="leaf" id="l1" style="width:48px;height:35px;bottom:185px;right:62px;transform-origin:bottom right;">
          <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=100&auto=format&fit=crop&q=60"
               onerror="this.parentElement.style.display='none'"
               style="border-radius:0;filter:hue-rotate(60deg) saturate(1.4) brightness(0.7) scaleX(-1);" alt="leaf"/>
        </div>

        <!-- RIBBON -->
        <div class="ribbon" style="animation-delay:0.5s;">
          <svg viewBox="0 0 110 55" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="55" cy="30" rx="50" ry="22" fill="#c2185b" opacity="0.9"/>
            <ellipse cx="55" cy="28" rx="46" ry="18" fill="#e91e63" opacity="0.85"/>
            <ellipse cx="55" cy="26" rx="40" ry="14" fill="#f06292" opacity="0.7"/>
            <!-- bow knot -->
            <ellipse cx="55" cy="20" rx="8" ry="6" fill="#c2185b"/>
            <path d="M47,20 Q35,10 30,18 Q35,26 47,20Z" fill="#e91e63" opacity="0.9"/>
            <path d="M63,20 Q75,10 80,18 Q75,26 63,20Z" fill="#e91e63" opacity="0.9"/>
            <circle cx="55" cy="20" r="5" fill="#ad1457"/>
            <!-- ribbon tails -->
            <path d="M50,26 Q44,38 40,48" stroke="#c2185b" stroke-width="3" fill="none" stroke-linecap="round"/>
            <path d="M60,26 Q66,38 70,48" stroke="#c2185b" stroke-width="3" fill="none" stroke-linecap="round"/>
          </svg>
        </div>

        <!-- FLOWER 1: Sunflower (center back) -->
        <div class="flower back" id="f0"
             style="width:110px;height:110px;bottom:225px;left:105px;--br:-2deg;--bd:6s;--bdelay:0s;">
          <img src="https://images.unsplash.com/photo-1597848212624-a19eb35e2651?w=300&auto=format&fit=crop&q=80" alt="sunflower"/>
        </div>

        <!-- FLOWER 2: Red Rose (left) -->
        <div class="flower mid" id="f1"
             style="width:100px;height:100px;bottom:238px;left:40px;--br:3deg;--bd:5.5s;--bdelay:0.4s;">
          <img src="https://images.unsplash.com/photo-1548460268-a2ae5ec0d240?w=300&auto=format&fit=crop&q=80" alt="red rose"/>
        </div>

        <!-- FLOWER 3: Pink Rose (right) -->
        <div class="flower mid" id="f2"
             style="width:100px;height:100px;bottom:238px;right:40px;--br:-3deg;--bd:5s;--bdelay:0.6s;">
          <img src="https://images.unsplash.com/photo-1559563458-527698bf5295?w=300&auto=format&fit=crop&q=80" alt="pink rose"/>
        </div>

        <!-- FLOWER 4: Orchid (far left) -->
        <div class="flower back" id="f3"
             style="width:88px;height:88px;bottom:252px;left:10px;--br:4deg;--bd:7s;--bdelay:0.2s;">
          <img src="https://images.unsplash.com/photo-1566907225472-514215c9e6e4?w=300&auto=format&fit=crop&q=80" alt="orchid"/>
        </div>

        <!-- FLOWER 5: Carnation (far right) -->
        <div class="flower back" id="f4"
             style="width:88px;height:88px;bottom:250px;right:8px;--br:-4deg;--bd:6.5s;--bdelay:0.3s;">
          <img src="https://images.unsplash.com/photo-1490750967868-88df5691cc5e?w=300&auto=format&fit=crop&q=80" alt="carnation"/>
        </div>

        <!-- FLOWER 6: Gerbera Daisy (front center) -->
        <div class="flower front" id="f5"
             style="width:105px;height:105px;bottom:192px;left:108px;--br:1deg;--bd:5s;--bdelay:0.5s;">
          <img src="https://images.unsplash.com/photo-1490750967868-88df5691cc5e?w=300&auto=format&fit=crop&q=80" alt="gerbera daisy"
               style="filter:hue-rotate(20deg) saturate(1.3);"/>
        </div>

      </div><!-- /bouquet -->

      <!-- ENVELOPE -->
      <a href="letter.html" class="envelope-wrap">
        <div class="envelope">
          <div class="env-body">
            <div class="env-lines"><span></span><span></span><span></span></div>
          </div>
          <div class="env-flap"></div>
          <div class="env-heart">💌</div>
        </div>
        <span>Open me</span>
      </a>

    </div>
  </div>

<script>
// ── STEM GROW SEQUENCE ──
const stemDelays = [200, 400, 500, 650, 700, 300]; // ms
const stemDurs   = [1200,1100,1100,1000,1000,1300];

stemDelays.forEach((delay, i) => {
  setTimeout(() => {
    const el = document.getElementById('s'+i);
    if (!el) return;
    el.style.animationDuration = stemDurs[i] + 'ms';
    el.classList.add('grow');
  }, delay);
});

// ── LEAF SPROUT ──
const leafDelays = [1400, 1600];
leafDelays.forEach((delay, i) => {
  setTimeout(() => {
    const el = document.getElementById('l'+i);
    if (el) el.classList.add('sprout');
  }, delay);
});

// ── FLOWER BLOOM SEQUENCE ──
const flowerDelays = [1600, 1900, 2100, 2300, 2400, 2700];
flowerDelays.forEach((delay, i) => {
  setTimeout(() => {
    const el = document.getElementById('f'+i);
    if (!el) return;
    el.classList.add('bloom');
    // after bloom, add breathe
    setTimeout(() => {
      el.classList.remove('bloom');
      el.style.opacity = '1';
      el.style.transform = 'scale(1)';
      el.classList.add('breathe');
    }, 1600);
  }, delay);
});

// ── POLLEN PARTICLES ──
const bouquet = document.getElementById('bouquet');
const pollenColors = ['#ffd54f','#ffb300','#ff8f00','#f48fb1','#ce93d8','#fff9c4'];
function spawnPollen() {
  const p = document.createElement('div');
  p.className = 'pollen-dot';
  const size = 2 + Math.random() * 4;
  p.style.width  = size + 'px';
  p.style.height = size + 'px';
  p.style.background = pollenColors[Math.floor(Math.random() * pollenColors.length)];
  p.style.boxShadow  = `0 0 ${size*2}px ${p.style.background}`;
  p.style.left = (60 + Math.random() * 200) + 'px';
  p.style.bottom = (200 + Math.random() * 180) + 'px';
  p.style.setProperty('--px', (Math.random()-0.5)*60 + 'px');
  p.style.animationDuration = (2.5 + Math.random() * 3) + 's';
  p.style.animationDelay    = (Math.random() * 2) + 's';
  bouquet.appendChild(p);
  setTimeout(() => p.remove(), 6000);
}
setInterval(spawnPollen, 300);

// ── FALLING PETALS ──
const pc = document.getElementById('petals');
for (let i = 0; i < 22; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (5 + Math.random() * 7) + 's';
  p.style.animationDelay    = (Math.random() * 12) + 's';
  p.style.width  = (6 + Math.random() * 10) + 'px';
  p.style.height = (9 + Math.random() * 12) + 'px';
  p.style.opacity = '0.5';
  pc.appendChild(p);
}

// ── FLOATING HEARTS ──
const wrap = document.getElementById('bouquet');
const hEmojis = ['💕','💗','💖','🌸','💓','✨'];
function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'float-heart';
  h.textContent = hEmojis[Math.floor(Math.random() * hEmojis.length)];
  h.style.left   = (20 + Math.random() * 280) + 'px';
  h.style.bottom = (200 + Math.random() * 150) + 'px';
  h.style.animationDuration = (2.5 + Math.random() * 2.5) + 's';
  h.style.animationDelay = '0s';
  h.style.fontSize = (0.8 + Math.random() * 0.6) + 'rem';
  wrap.appendChild(h);
  setTimeout(() => h.remove(), 5000);
}
setInterval(spawnHeart, 900);
</script>
</body>
</html>
