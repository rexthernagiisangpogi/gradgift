  <style>
    /* ── overlay UI on top of flower scene ── */
    #ui-overlay {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 3vmin;
      gap: 16px;
      pointer-events: none;
    }

    #ui-overlay h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      color: #a7ffee;
      text-shadow: 0 0 20px rgba(107,240,255,0.6);
      letter-spacing: 3px;
      font-style: italic;
      animation: fadeUp 1.5s ease 1s both;
      pointer-events: none;
    }

    #ui-overlay .envelope-wrap {
      pointer-events: all;
      animation: fadeUp 1.5s ease 1.5s both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* envelope smaller */
    .envelope      { width: 100px !important; height: 70px !important; }
    .env-flap      { height: 38px !important; }
    .env-heart     { font-size: 1.3rem !important; }
    .envelope-wrap span {
      font-size: 0.9rem !important;
      color: #a7ffee !important;
      text-shadow: 0 0 10px rgba(107,240,255,0.5);
    }

    /* env-body override for dark theme */
    .env-body {
      background: linear-gradient(160deg, #0d3d40, #1a6b70) !important;
      border-color: #39c6d6 !important;
    }
    .env-flap {
      background: linear-gradient(160deg, #1a6b70, #39c6d6) !important;
      border-color: #39c6d6 !important;
    }
    .env-lines span { background: rgba(107,240,255,0.3) !important; }
  </style>
</head>
