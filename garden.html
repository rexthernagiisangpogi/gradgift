<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Gift For You 🌸</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .garden-page { padding-top: 20px; }
    #bouquetCanvas {
      display: block;
      filter: drop-shadow(0 12px 32px rgba(249,168,201,0.5));
      animation: sway 5s ease-in-out infinite;
      transform-origin: bottom center;
    }
    @keyframes sway {
      0%,100% { transform: rotate(-2deg); }
      50%      { transform: rotate(2deg); }
    }
    .bouquet-wrap { position: relative; display: flex; flex-direction: column; align-items: center; }
    .envelope      { width: 100px !important; height: 70px !important; }
    .env-flap      { height: 38px !important; }
    .env-heart     { font-size: 1.3rem !important; }
    .envelope-wrap span { font-size: 0.85rem !important; }
    .pollen {
      position: absolute; border-radius: 50%; pointer-events: none;
      animation: pollenFloat ease-in-out infinite; opacity: 0;
    }
    @keyframes pollenFloat {
      0%   { opacity:0; transform:translateY(0) scale(0.5); }
      30%  { opacity:0.8; }
      100% { opacity:0; transform:translateY(-70px) scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="petals" id="petals"></div>
  <div class="garden-page">
    <h2>A little something for you 🌸</h2>
    <p class="subtitle">Click the envelope when you're ready ✉️</p>
    <div class="scene">
      <div class="bouquet-wrap" id="bouquetWrap">
        <canvas id="bouquetCanvas" width="360" height="400"></canvas>
      </div>
      <a href="letter.html" class="envelope-wrap">
        <div class="envelope">
          <div class="env-body">
            <div class="env-lines"><span></span><span></span><span></span></div>
          </div>
          <div class="env-flap"></div>
          <div class="env-heart">💌</div>
        </div>
        <span>Open me ✨</span>
      </a>
    </div>
  </div>

<script>
const canvas = document.getElementById('bouquetCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── EASING ──
function easeOutCubic(t)   { return 1-Math.pow(1-t,3); }
function easeOutElastic(t) {
  if(t===0||t===1) return t;
  return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1;
}
function easeInOutCubic(t) { return t<0.5?4*t*t*t:(1-Math.pow(-2*t+2,3))/2; }
function clamp(v,a,b)      { return Math.max(a,Math.min(b,v)); }
function prog(t,s,e)       { return clamp((t-s)/(e-s),0,1); }

const TOTAL = 6000; // ms
let startTime = null;
let breatheT  = 0;

// ── STEM ──
function drawStem(x1,y1,x2,y2,t,col,w) {
  if(t<=0) return;
  const ex=x1+(x2-x1)*t, ey=y1+(y2-y1)*t;
  const cpx=(x1+x2)/2+(x2>x1?-8:8), cpy=(y1+y2)/2-10;
  ctx.save();
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap='round';
  ctx.shadowBlur=4; ctx.shadowColor=col;
  // draw partial bezier by sampling
  ctx.beginPath();
  let first=true;
  const steps=40;
  for(let i=0;i<=steps;i++){
    const u=(i/steps)*t;
    const px=(1-u)*(1-u)*x1+2*(1-u)*u*cpx+u*u*x2;
    const py=(1-u)*(1-u)*y1+2*(1-u)*u*cpy+u*u*y2;
    first?(ctx.moveTo(px,py),first=false):ctx.lineTo(px,py);
  }
  ctx.stroke(); ctx.restore();
}

// ── LEAF ──
function drawLeaf(x,y,angle,size,t,col) {
  if(t<=0) return;
  const s=easeOutElastic(clamp(t,0,1));
  ctx.save();
  ctx.translate(x,y); ctx.rotate(angle); ctx.scale(s,s);
  ctx.fillStyle=col; ctx.shadowBlur=4; ctx.shadowColor=col;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(-size*.5,-size*.4,-size*.3,-size,0,-size*1.1);
  ctx.bezierCurveTo(size*.3,-size,size*.5,-size*.4,0,0);
  ctx.fill(); ctx.restore();
}

// ── GENERIC PETAL ──
function drawPetal(cx,cy,angle,len,wid,col,alpha,t,curvature) {
  if(t<=0||alpha<=0) return;
  const cv = curvature||0.85;
  const sy=easeOutElastic(clamp(t,0,1));
  ctx.save();
  ctx.globalAlpha=clamp(alpha,0,1);
  ctx.translate(cx,cy); ctx.rotate(angle); ctx.scale(1,sy);
  ctx.fillStyle=col; ctx.shadowBlur=6; ctx.shadowColor=col;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(-wid*0.6,-len*0.3,-wid*0.5,-len*cv,0,-len);
  ctx.bezierCurveTo(wid*0.5,-len*cv,wid*0.6,-len*0.3,0,0);
  ctx.fill(); ctx.restore();
}

// ── CENTER ──
function drawCenter(cx,cy,r,c1,c2,t,shadowCol) {
  if(t<=0) return;
  const cr=r*easeOutCubic(clamp(t,0,1));
  ctx.save();
  const g=ctx.createRadialGradient(cx-cr*.25,cy-cr*.25,cr*.05,cx,cy,cr);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2);
  ctx.fillStyle=g; ctx.shadowBlur=10; ctx.shadowColor=shadowCol||c1;
  ctx.fill(); ctx.restore();
}

// ══════════════════════════════════════════
//  FLOWER DRAWERS
// ══════════════════════════════════════════

// 1. SUNFLOWER
function drawSunflower(cx,cy,t,breath) {
  const tp=prog(t,0,0.7);
  const tc=prog(t,0.5,0.85);
  const s=breath;
  // outer petals (long, pointed)
  for(let i=0;i<16;i++){
    const angle=(i/16)*Math.PI*2;
    const pt=clamp(tp-i*0.035,0,1);
    const col=i%2===0?'#ffd166':'#ffb347';
    drawPetal(cx,cy,angle,30*s,8*s,col,pt,pt,0.9);
  }
  // inner shorter petals
  for(let i=0;i<16;i++){
    const angle=(i/16)*Math.PI*2+(Math.PI/16);
    const pt=clamp(tp-0.2-i*0.03,0,1);
    drawPetal(cx,cy,angle,20*s,6*s,'#ffc107',pt*0.8,pt,0.9);
  }
  // dark brown center
  drawCenter(cx,cy,16*s,'#6d3b00','#3e2000',tc,'#8B4513');
  // center texture dots
  if(tc>0.3){
    for(let i=0;i<12;i++){
      const a=(i/12)*Math.PI*2, r=8*s;
      ctx.save(); ctx.globalAlpha=(tc-0.3)/0.7*0.7;
      ctx.fillStyle='#a0522d';
      ctx.beginPath(); ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,1.5*s,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
}

// 2. RED ROSE
function drawRose(cx,cy,t,breath,col1,col2,colInner) {
  const tp=prog(t,0,0.75);
  const tc=prog(t,0.55,0.82);
  const s=breath;
  // outer petals (7, cupped shape)
  for(let i=0;i<7;i++){
    const angle=(i/7)*Math.PI*2;
    const pt=clamp(tp-i*0.07,0,1);
    drawPetal(cx,cy,angle,26*s,15*s,col1,pt*0.92,pt,0.8);
  }
  // mid petals
  for(let i=0;i<6;i++){
    const angle=(i/6)*Math.PI*2+0.45;
    const pt=clamp(tp-0.25-i*0.06,0,1);
    drawPetal(cx,cy,angle,18*s,11*s,col2,pt*0.9,pt,0.75);
  }
  // inner tight petals
  for(let i=0;i<5;i++){
    const angle=(i/5)*Math.PI*2+0.2;
    const pt=clamp(tp-0.45-i*0.05,0,1);
    drawPetal(cx,cy,angle,11*s,7*s,colInner,pt*0.88,pt,0.7);
  }
  // center bud
  drawCenter(cx,cy,7*s,'#ffcdd2',col2,tc,col1);
}

// 3. ORCHID
function drawOrchid(cx,cy,t,breath) {
  const tp=prog(t,0,0.72);
  const tc=prog(t,0.52,0.80);
  const s=breath;
  // 2 large back petals (dorsal)
  for(let i=0;i<2;i++){
    const angle=-Math.PI/2+(i===0?-0.5:0.5);
    const pt=clamp(tp-i*0.1,0,1);
    drawPetal(cx,cy,angle,28*s,10*s,'#ce93d8',pt*0.9,pt,0.88);
  }
  // 2 side petals (lateral)
  for(let i=0;i<2;i++){
    const angle=(i===0?Math.PI*0.1:-Math.PI*0.1)+Math.PI/2;
    const pt=clamp(tp-0.1-i*0.08,0,1);
    drawPetal(cx,cy,angle,24*s,12*s,'#ba68c8',pt*0.9,pt,0.85);
  }
  // 1 top dorsal petal
  const pt0=clamp(tp-0.05,0,1);
  drawPetal(cx,cy,-Math.PI/2,26*s,11*s,'#ab47bc',pt0*0.9,pt0,0.88);
  // lip petal (labellum) — wider, more colorful
  const ptL=clamp(tp-0.15,0,1);
  if(ptL>0){
    ctx.save();
    ctx.globalAlpha=ptL*0.95;
    ctx.translate(cx,cy); ctx.scale(s,easeOutElastic(clamp(ptL,0,1))*s);
    ctx.fillStyle='#f48fb1';
    ctx.shadowBlur=8; ctx.shadowColor='#e91e8c';
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(-14,4,-16,18,-8,26);
    ctx.bezierCurveTo(-2,30,2,30,8,26);
    ctx.bezierCurveTo(16,18,14,4,0,0);
    ctx.fill();
    // lip pattern
    ctx.globalAlpha=ptL*0.5; ctx.fillStyle='#c2185b';
    ctx.beginPath(); ctx.ellipse(0,18*s,4*s,6*s,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // column (center)
  drawCenter(cx,cy,6*s,'#fff9c4','#f9a825',tc,'#ffd54f');
  // purple dots on lip
  if(tc>0.2){
    [[-3,14],[3,14],[0,20],[-5,18],[5,18]].forEach(([dx,dy])=>{
      ctx.save(); ctx.globalAlpha=(tc-0.2)/0.8*0.6;
      ctx.fillStyle='#880e4f';
      ctx.beginPath(); ctx.arc(cx+dx*s,cy+dy*s,1.2*s,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }
}

// 4. CARNATION
function drawCarnation(cx,cy,t,breath,col1,col2) {
  const tp=prog(t,0,0.78);
  const s=breath;
  // carnations have many ruffled petals in layers
  const layers=[
    {count:8, len:20, wid:10, col:col1, offset:0,    delay:0},
    {count:8, len:17, wid:9,  col:col2, offset:0.2,  delay:0.12},
    {count:7, len:14, wid:8,  col:col1, offset:0.4,  delay:0.22},
    {count:6, len:11, wid:7,  col:col2, offset:0.6,  delay:0.32},
    {count:5, len:8,  wid:6,  col:col1, offset:0.8,  delay:0.40},
  ];
  layers.forEach(layer=>{
    for(let i=0;i<layer.count;i++){
      const angle=(i/layer.count)*Math.PI*2+layer.offset;
      const pt=clamp(tp-layer.delay-i*0.04,0,1);
      if(pt<=0) return;
      // ruffled edge — draw petal with jagged top
      const sy=easeOutElastic(clamp(pt,0,1));
      ctx.save();
      ctx.globalAlpha=pt*0.92;
      ctx.translate(cx,cy); ctx.rotate(angle); ctx.scale(s,sy*s);
      ctx.fillStyle=layer.col; ctx.shadowBlur=5; ctx.shadowColor=layer.col;
      ctx.beginPath();
      ctx.moveTo(0,0);
      // ruffled petal shape
      ctx.bezierCurveTo(-layer.wid*.5,-layer.len*.2,-layer.wid*.7,-layer.len*.6,-layer.wid*.4,-layer.len);
      ctx.bezierCurveTo(-layer.wid*.2,-layer.len*1.1,0,-layer.len*1.15,0,-layer.len);
      ctx.bezierCurveTo(layer.wid*.2,-layer.len*1.1,layer.wid*.4,-layer.len*1.05,layer.wid*.4,-layer.len);
      ctx.bezierCurveTo(layer.wid*.7,-layer.len*.6,layer.wid*.5,-layer.len*.2,0,0);
      ctx.fill(); ctx.restore();
    }
  });
  // small center
  const tc=prog(t,0.55,0.80);
  drawCenter(cx,cy,5*s,'#fff',col2,tc,col1);
}

// 5. GERBERA DAISY
function drawGerbera(cx,cy,t,breath,col1,col2) {
  const tp=prog(t,0,0.72);
  const tc=prog(t,0.50,0.78);
  const s=breath;
  // outer petals (long, narrow, many)
  for(let i=0;i<24;i++){
    const angle=(i/24)*Math.PI*2;
    const pt=clamp(tp-i*0.025,0,1);
    drawPetal(cx,cy,angle,28*s,6*s,col1,pt*0.95,pt,0.92);
  }
  // inner shorter petals
  for(let i=0;i<16;i++){
    const angle=(i/16)*Math.PI*2+(Math.PI/16);
    const pt=clamp(tp-0.2-i*0.03,0,1);
    drawPetal(cx,cy,angle,18*s,5*s,col2,pt*0.85,pt,0.9);
  }
  // dark center ring
  drawCenter(cx,cy,10*s,'#3d2b00','#1a1200',tc,'#5d4037');
  // bright inner center
  drawCenter(cx,cy,6*s,'#ffd54f','#ff8f00',prog(t,0.58,0.82),'#ffc107');
  // center dots
  if(tc>0.4){
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2, r=7.5*s;
      ctx.save(); ctx.globalAlpha=(tc-0.4)/0.6*0.8;
      ctx.fillStyle='#ff6f00';
      ctx.beginPath(); ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,1.2*s,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
}

// ══════════════════════════════════════════
//  FLOWER LAYOUT
// ══════════════════════════════════════════
// positions: sunflower(center), red rose(left), pink rose(right),
//            orchid(far left), carnation(far right), gerbera(front center)
const layout = [
  // type, cx, cy, stemX1,stemY1,stemX2,stemY2, stemCol, stemW, leaves, tStem, tFlower
  {
    type:'sunflower', cx:180, cy:185,
    sx1:180,sy1:395, sx2:180,sy2:200, sc:'#5a9e50', sw:6,
    leaves:[{x:155,y:295,a:-0.55,s:24,c:'#388e3c'},{x:205,y:275,a:0.55,s:22,c:'#43a047'}],
    tStem:[0,0.30], tLeaf:[0.22,0.44], tFlower:[0.36,1.0], delay:0
  },
  {
    type:'redrose', cx:105, cy:200,
    sx1:175,sy1:388, sx2:105,sy2:215, sc:'#6abf69', sw:5,
    leaves:[{x:140,y:310,a:-0.6,s:20,c:'#66bb6a'}],
    tStem:[0.06,0.34], tLeaf:[0.26,0.46], tFlower:[0.40,1.0], delay:0
  },
  {
    type:'pinkrose', cx:255, cy:200,
    sx1:185,sy1:388, sx2:255,sy2:215, sc:'#6abf69', sw:5,
    leaves:[{x:220,y:305,a:0.6,s:20,c:'#66bb6a'}],
    tStem:[0.08,0.36], tLeaf:[0.28,0.48], tFlower:[0.42,1.0], delay:0
  },
  {
    type:'orchid', cx:55, cy:215,
    sx1:172,sy1:382, sx2:55,sy2:230, sc:'#81c784', sw:4,
    leaves:[{x:110,y:320,a:-0.65,s:18,c:'#81c784'}],
    tStem:[0.12,0.40], tLeaf:[0.32,0.52], tFlower:[0.46,1.0], delay:0
  },
  {
    type:'carnation', cx:305, cy:210,
    sx1:188,sy1:382, sx2:305,sy2:225, sc:'#81c784', sw:4,
    leaves:[{x:250,y:315,a:0.65,s:18,c:'#81c784'}],
    tStem:[0.14,0.42], tLeaf:[0.34,0.54], tFlower:[0.48,1.0], delay:0
  },
  {
    type:'gerbera', cx:180, cy:155,
    sx1:180,sy1:395, sx2:180,sy2:170, sc:'#4caf50', sw:4,
    leaves:[{x:162,y:260,a:-0.4,s:16,c:'#66bb6a'},{x:198,y:245,a:0.4,s:16,c:'#66bb6a'}],
    tStem:[0.02,0.28], tLeaf:[0.20,0.40], tFlower:[0.34,1.0], delay:0
  },
];

function drawRibbon(t) {
  if(t<=0) return;
  ctx.save(); ctx.globalAlpha=clamp(t*2,0,1);
  ctx.fillStyle='#ffb3c6'; ctx.shadowBlur=10; ctx.shadowColor='#ff85a1';
  ctx.beginPath();
  ctx.moveTo(125,332); ctx.quadraticCurveTo(180,318,235,332);
  ctx.quadraticCurveTo(228,348,180,351); ctx.quadraticCurveTo(132,348,125,332);
  ctx.fill();
  ctx.strokeStyle='#e8638c'; ctx.lineWidth=1.8; ctx.globalAlpha=clamp(t*2,0,1)*0.55;
  ctx.beginPath(); ctx.moveTo(135,329); ctx.quadraticCurveTo(180,320,225,329); ctx.stroke();
  ctx.restore();
}

function render(ts) {
  if(!startTime) startTime=ts;
  const t=clamp((ts-startTime)/TOTAL,0,1);
  breatheT+=0.016;

  ctx.clearRect(0,0,W,H);
  drawRibbon(prog(t,0,0.12));

  layout.forEach((f,idx)=>{
    const breath=1+Math.sin(breatheT+idx*0.85)*0.016;

    // stem
    const tStem=easeOutCubic(prog(t,f.tStem[0],f.tStem[1]));
    drawStem(f.sx1,f.sy1,f.sx2,f.sy2,tStem,f.sc,f.sw);

    // leaves
    const tLeafG=prog(t,f.tLeaf[0],f.tLeaf[1]);
    f.leaves.forEach((l,i)=>{
      drawLeaf(l.x,l.y,l.a,l.s,clamp(tLeafG-i*0.2,0,1),l.c);
    });

    // flower
    const tf=prog(t,f.tFlower[0],f.tFlower[1]);
    if(tf<=0) return;

    if(f.type==='sunflower') drawSunflower(f.cx,f.cy,tf,breath);
    else if(f.type==='redrose')  drawRose(f.cx,f.cy,tf,breath,'#c62828','#e53935','#ef9a9a');
    else if(f.type==='pinkrose') drawRose(f.cx,f.cy,tf,breath,'#e91e8c','#f06292','#f8bbd0');
    else if(f.type==='orchid')   drawOrchid(f.cx,f.cy,tf,breath);
    else if(f.type==='carnation')drawCarnation(f.cx,f.cy,tf,breath,'#e91e63','#f48fb1');
    else if(f.type==='gerbera')  drawGerbera(f.cx,f.cy,tf,breath,'#ff5722','#ff8a65');
  });

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ── PETALS ──
const pc=document.getElementById('petals');
for(let i=0;i<28;i++){
  const p=document.createElement('div'); p.className='petal';
  p.style.left=Math.random()*100+'vw';
  p.style.animationDuration=(4+Math.random()*6)+'s';
  p.style.animationDelay=(Math.random()*10)+'s';
  p.style.width=(8+Math.random()*12)+'px';
  p.style.height=(12+Math.random()*14)+'px';
  pc.appendChild(p);
}

// ── SPARKLES ──
['✨','💫','🌟','✦'].forEach((_,i)=>{
  for(let j=0;j<4;j++){
    const s=document.createElement('div'); s.className='sparkle';
    s.textContent=['✨','💫','🌟','✦'][Math.floor(Math.random()*4)];
    s.style.left=Math.random()*100+'vw';
    s.style.top=(10+Math.random()*80)+'vh';
    s.style.animationDuration=(3+Math.random()*5)+'s';
    s.style.animationDelay=(Math.random()*8)+'s';
    document.body.appendChild(s);
  }
});

// ── HEARTS ──
const wrap=document.getElementById('bouquetWrap');
const hEmojis=['💕','💗','💖','🌸','💓'];
function spawnHeart(){
  const h=document.createElement('div'); h.className='float-heart';
  h.textContent=hEmojis[Math.floor(Math.random()*hEmojis.length)];
  h.style.left=(10+Math.random()*320)+'px';
  h.style.bottom=(60+Math.random()*130)+'px';
  h.style.animationDuration=(2+Math.random()*2)+'s';
  h.style.animationDelay='0s';
  wrap.appendChild(h);
  setTimeout(()=>h.remove(),4000);
}
setInterval(spawnHeart,700);

// ── POLLEN ──
const pollenCols=['#ffd166','#ffb347','#ff85a1','#ce93d8','#ff5722'];
function spawnPollen(){
  const p=document.createElement('div'); p.className='pollen';
  const sz=3+Math.random()*5;
  p.style.width=sz+'px'; p.style.height=sz+'px';
  p.style.background=pollenCols[Math.floor(Math.random()*pollenCols.length)];
  p.style.left=(40+Math.random()*280)+'px';
  p.style.top=(60+Math.random()*200)+'px';
  p.style.animationDuration=(2+Math.random()*3)+'s';
  p.style.animationDelay=(Math.random()*2)+'s';
  wrap.appendChild(p);
  setTimeout(()=>p.remove(),5000);
}
setInterval(spawnPollen,350);
</script>
</body>
