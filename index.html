<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Congratulations 🎓</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="petals" id="petals"></div>

  <div class="front-page">
    <div class="card">
      <span class="cap-emoji">🎓</span>
      <h1>Congratulations,</h1>
      <div class="name">Graduate ✨</div>
      <div class="hearts">
        <span>🌸</span> <span>💕</span> <span>🌸</span>
      </div>
      <p id="typeText"></p>
      <a href="garden.html" class="btn">Continue &rarr;</a>

      <!-- QR CODE SECTION -->
      <div style="margin-top:32px; display:flex; flex-direction:column; align-items:center; gap:10px;">
        <p style="font-size:0.8rem; color:#b07a90; font-style:italic;">📱 Scan to open on your phone</p>
        <div style="background:#fff; padding:10px; border-radius:16px; border:2px solid #f9c8d8; box-shadow:0 4px 16px rgba(249,168,201,0.3);">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&color=e8638c&bgcolor=ffffff&data=https://rexthernagiisangpogi.github.io/gradgift/" alt="QR Code" style="display:block; border-radius:8px;" />
        </div>
      </div>
    </div>
  </div>

  <script>
    // Falling petals
    const petalContainer = document.getElementById('petals');
    for (let i = 0; i < 24; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (4 + Math.random() * 6) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.width = (8 + Math.random() * 12) + 'px';
      p.style.height = (12 + Math.random() * 14) + 'px';
      petalContainer.appendChild(p);
    }

    // Sparkles
    const sparkles = ['✨','⭐','💫','🌟','✦','✧'];
    for (let i = 0; i < 20; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top = (20 + Math.random() * 70) + 'vh';
      s.style.animationDuration = (3 + Math.random() * 5) + 's';
      s.style.animationDelay = (Math.random() * 8) + 's';
      s.style.fontSize = (0.7 + Math.random() * 1) + 'rem';
      document.body.appendChild(s);
    }

    // Typewriter
    const msg = "You did it! All those late nights, all that hard work — it all led to this beautiful moment. I am so incredibly proud of you. 🌸";
    const el = document.getElementById('typeText');
    let i = 0;
    function type() {
      if (i < msg.length) {
        el.textContent += msg[i++];
        setTimeout(type, 28);
      }
    }
    setTimeout(type, 1200);
  </script>
</body>
</html>
