<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Congratulations 🎓</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0010; overflow: hidden; width: 100vw; height: 100vh; }

    canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }

    /* Continue button + subtitle — hidden until after morph */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 14vh;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }
    #ui.show { opacity: 1; pointer-events: all; }

    #ui .sub {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: #ffd6e8;
      text-shadow: 0 0 16px #ff85a1;
      letter-spacing: 3px;
      margin-bottom: 32px;
      animation: fadeSlideUp 0.8s ease both;
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <div id="ui">
    <div class="sub">Graduate ✨</div>
    <a href="garden.html" class="btn">Open your gift &rarr;</a>
  </div>

  <script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');

  let W = canvas.width  = window.innerWidth;
  let H = canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    buildTargets();
  });

  // ── COLORS ──
  const COLORS = ['#ff85a1','#ffd166','#ffffff','#c9b1ff','#a8e6cf','#ffb3c6','#ff6b9d','#ffc8dd'];

  // ══════════════════════════════
  //  STEP 1 — sample letter pixel positions from canvas text
  // ══════════════════════════════
  let targets = [];

  function buildTargets() {
    // Draw text to an offscreen canvas to sample pixel positions
    const off = document.createElement('canvas');
    off.width  = W;
    off.height = H;
    const octx = off.getContext('2d');

    const fontSize = Math.min(W / 7, 90);
    octx.font = `700 ${fontSize}px 'Playfair Display', serif`;
    octx.fillStyle = '#fff';
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';
    octx.fillText('Congratulations', W / 2, H / 2);

    const data = octx.getImageData(0, 0, W, H).data;
    const gap  = Math.max(4, Math.floor(W / 160)); // sample every N pixels
    targets = [];
    for (let y = 0; y < H; y += gap) {
      for (let x = 0; x < W; x += gap) {
        const idx = (y * W + x) * 4;
        if (data[idx + 3] > 128) {
          targets.push({ x, y });
        }
      }
    }
    // shuffle so particles fly from random burst positions to random letter pixels
    targets.sort(() => Math.random() - 0.5);
  }

  buildTargets();

  // ══════════════════════════════
  //  PARTICLE CLASS
  // ══════════════════════════════
  class Particle {
    constructor(x, y, color, target) {
      // start at burst origin
      this.x  = x;
      this.y  = y;
      this.color  = color;
      this.target = target; // {x, y} letter pixel

      // random burst velocity
      const angle = Math.random() * Math.PI * 2;
      const speed = 3 + Math.random() * 8;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;

      this.alpha   = 1;
      this.radius  = 2 + Math.random() * 2.5;
      this.phase   = 'burst';   // 'burst' → 'morph' → 'hold'
      this.morphT  = 0;         // 0→1 lerp progress
    }

    update(morphing) {
      if (this.phase === 'burst') {
        this.x  += this.vx;
        this.y  += this.vy;
        this.vy += 0.12;        // gravity
        this.vx *= 0.97;
        this.alpha -= 0.008;
        if (morphing) {
          this.phase = 'morph';
          this.alpha = 1;
          // snapshot current position as morph start
          this.sx = this.x;
          this.sy = this.y;
        }
      } else if (this.phase === 'morph') {
        this.morphT += 0.022;   // speed of morph
        const t = easeOutExpo(Math.min(this.morphT, 1));
        this.x = lerp(this.sx, this.target.x, t);
        this.y = lerp(this.sy, this.target.y, t);
        if (this.morphT >= 1) this.phase = 'hold';
      }
    }

    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.fillStyle   = this.color;
      ctx.shadowBlur  = this.phase === 'hold' ? 6 : 10;
      ctx.shadowColor = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function lerp(a, b, t) { return a + (b - a) * t; }
  function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }

  // ══════════════════════════════
  //  ROCKET / TRAIL
  // ══════════════════════════════
  class Rocket {
    constructor() {
      this.x = W * (0.2 + Math.random() * 0.6);
      this.y = H;
      this.ty = H * (0.25 + Math.random() * 0.3);
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.speed = 14 + Math.random() * 8;
      this.done  = false;
    }
    update() {
      this.y -= this.speed;
      if (this.y <= this.ty) this.done = true;
    }
    draw() {
      ctx.save();
      ctx.fillStyle  = this.color;
      ctx.shadowBlur = 12;
      ctx.shadowColor = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ══════════════════════════════
  //  STATE
  // ══════════════════════════════
  let rockets    = [];
  let particles  = [];
  let morphing   = false;
  let done       = false;
  let burstCount = 0;

  // launch rockets every 350ms for 2.8s
  const rocketTimer = setInterval(() => {
    rockets.push(new Rocket());
  }, 350);

  // after 2.8s — do one big central burst then morph
  setTimeout(() => {
    clearInterval(rocketTimer);

    // spawn exactly as many particles as targets
    const bx = W / 2;
    const by = H * 0.38;
    const count = Math.min(targets.length, 1200);

    // trim targets to count
    const usedTargets = targets.slice(0, count);

    for (let i = 0; i < count; i++) {
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      particles.push(new Particle(bx, by, color, usedTargets[i]));
    }

    // let burst play for 0.9s then start morphing
    setTimeout(() => { morphing = true; }, 900);

    // show UI after morph completes (~3s after morph starts)
    setTimeout(() => {
      done = true;
      document.getElementById('ui').classList.add('show');
    }, 900 + 2800);

  }, 2800);

  // ══════════════════════════════
  //  RENDER LOOP
  // ══════════════════════════════
  function loop() {
    // dark trail fade
    ctx.fillStyle = done ? 'rgba(10,0,16,0.35)' : 'rgba(10,0,16,0.22)';
    ctx.fillRect(0, 0, W, H);

    // rockets
    rockets.forEach(r => { r.update(); r.draw(); });
    rockets = rockets.filter(r => !r.done);

    // particles
    particles.forEach(p => p.update(morphing));
    particles.forEach(p => p.draw());
    // only remove burst particles that faded; keep morph/hold ones
    particles = particles.filter(p => p.phase !== 'burst' || p.alpha > 0);

    requestAnimationFrame(loop);
  }
  loop();
  </script>
</body>
</html>
